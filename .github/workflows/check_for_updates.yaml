name: Check for updates
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  check_for_image_updates:
    name: Check for image updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make check_for_image_updates
        run: make check_for_image_updates
  check_for_library_updates:
    name: Check for library updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make check_for_library_updates
        run: make check_for_library_updates
      - name: Run check_for_file_updates.sh
        run: ./tools/check_for_file_updates.sh Gemfile.lock
  check_for_action_updates:
    name: Check for GitHub Actions updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make check_for_action_updates
        run: make check_for_action_updates
  check_for_new_release:
    name: Check for new release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make check_for_new_release
        run: make check_for_new_release
