name: CI
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make hadolint
        run: make hadolint
  dockerfmt:
    name: dockerfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make dockerfmt
        run: make dockerfmt
  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make eslint
        run: make eslint
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make markdownlint
        run: make markdownlint
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make rubocop
        run: make rubocop
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make shellcheck
        run: make shellcheck
  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make shfmt
        run: make shfmt
  license_finder:
    name: License Finder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make license_finder
        run: make license_finder
  rspec:
    name: Test the application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Create .env file
        run: ./generate_dotenv.sh
      - name: Run make rspec
        run: make rspec
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run make trivy
        run: make trivy
  build:
    name: Build and Push
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: [hadolint, dockerfmt, eslint, markdownlint, rubocop, shellcheck, shfmt, license_finder, rspec, trivy]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          build-args: SOURCE_COMMIT=${{ github.sha }}
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            docker.io/shakiyam/bbs:latest
            ghcr.io/shakiyam/bbs:latest
